name: screen_therapist
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  provider: ^6.1.5+1
  http: ^1.2.2
  usage_stats: any
  sqflite: ^2.4.2
  path: ^1.9.1
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icons/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
